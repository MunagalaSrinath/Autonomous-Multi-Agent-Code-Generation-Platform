design_task:
  description: >
    Take the high level requirements described here and prepare a detailed design for the engineer;
    everything should be in 1 python module, but outline the classes and methods in the module.
    Here are the requirements: {requirements}
    IMPORTANT: Only output the design in markdown format, laying out in detail the classes and functions in the module.
  expected_output: >
    A detailed design for the engineer, identifying the classes and functions in the module.
  agent: engineering_lead
  output_file: output/{module_name}_design.md

code_task:
  description: >
    Write a python module that implements the design described by the engineering lead,
    in order to achieve the requirements.
    Here are the requirements: {requirements}
    IMPORTANT: |
    Output ONLY raw Python code.
    DO NOT include markdown formatting.
    DO NOT include ``` or ```python.
    The code must be executable without modification.
    Do NOT use deprecated APIs (e.g., gradio .style()).
    Use Gradio v4 syntax only.
  expected_output: >
    A python module that implements the design and achieves the requirements.
    IMPORTANT: Output ONLY the raw Python code.
  agent: backend_engineer
  context:
    - design_task
  output_file: output/{module_name}

frontend_task:
  description: >
    Write a gradio UI in a module app.py that demonstrates the given backend class in {module_name}.
    Assume there is only 1 user, and keep the UI clean.
    Here are the requirements: {requirements}
    IMPORTANT: |
    Output ONLY raw Python code.
    Use Gradio v4 syntax.
    DO NOT use .style().
    Every button MUST have a .click() handler.
    Functions MUST return outputs.
    The UI must be fully interactive and functional.
  expected_output: >
    A working gradio UI.
  agent: frontend_engineer
  context:
    - code_task
  output_file: output/app.py

test_task:
  description: >
    Write unit tests for the given backend module {module_name}.
  expected_output: >
    A test module.
  agent: backend_engineer
  context:
    - code_task
  output_file: output/test_{module_name}